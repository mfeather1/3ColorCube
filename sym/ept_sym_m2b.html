<script>
"use strict";
/*
  This program adds the sym op translation to et_sym[], note the difference in 
  use of op vs op16e[op*2+1] in get_etsym().
*/
var title = '3-Color Edge Symmetry<br>Alt Method 2B';
var count1 = new Uint32Array(E_PRM * E_TWIST);
var count2 = new Uint8Array(E_PRM * E_TWIST);
var ep_sym = new Uint16Array(E_PRM * CUBE_SYM);

// array to translate et_fr to et_uf 
var et_fr_uf = new Uint16Array(E_TWIST);

main();

function main() {
  init();
  count_ept_mins();
}

function count_ept_mins() {
  for (var ep=0; ep < E_PRM; ep++) {
    for(var et=0; et < E_TWIST; et++) {
      var min = ep*E_TWIST + et;
      if (count1[min] == 0) {
        count1[min] = min;
        for (var op=1; op < CUBE_SYM; op++) {
          var epsym = ep_sym[ep*CUBE_SYM+op];
          var etsym = get_etsym(ep, et, op);
          count1[epsym*E_TWIST+etsym] = min;
        }
      }
    }
  }
  count_mins(E_PRM, E_TWIST);
}

function get_etsym(ep, et, op) {
  if (op16e[op*2] == 0)
    return et_sym[et*CUBE_SYM+op];
  else if (op16e[op*2] == OP_FR)
    return et_sym[et_sym_FR[ep_slice[ep*3]*E_TWIST+et]*CUBE_SYM + op];
  else {
    var et_fr = et_sym_FR[ep_slice[ep*3+1]*E_TWIST+et];
    var et_uf = et_fr_uf[et_fr];  // translate et_fr to et_uf
    return et_sym[et_uf*CUBE_SYM + op];
  }
}

function populate_ep_sym() {
  assign_centers_3c();
  var tmpstr = new Uint8Array(FACELETS);
  for (var ep=0; ep < E_PRM; ep++) {
    ep_sym[ep*CUBE_SYM] = ep;
    int_to_strp(ep_b3[ep], eps, 11, 3);
    make_cubestr_edg(edg2);
    for (var op=1; op < CUBE_SYM; op++) {
      sym_op(tmpstr, cubestr, op);
      ep_sym[ep*CUBE_SYM+op] = convert_edg_3c(tmpstr); 
    }
  }
}

function local_populate_et_sym() {
  init_op16e();
  assign_centers_3c();
  int_to_strp(ep_b3[0], eps, 11, 3);
  var tmpstr = new Uint8Array(FACELETS);
  for(var i=0; i < E_TWIST;  i++)
    for (var j=0; j < CUBE_SYM; j++)
      if (op16e[j*2] == 0) {
        int_to_strp(i, ets, 11, 2);
        make_cubestr_edg(edg2);
        sym_op(tmpstr, cubestr, map[j]);
        convert_edg_3c(tmpstr);
        et_sym[i*CUBE_SYM+j] = str_to_int(ets,11,2);
    }
}

function local_update_et_sym()
{
  // update et_sym[] so that op16e[op*2+1] can be replaced by just op in get_etsym()
  var op_lr_fb = new Uint8Array([ 1, 2, 3, 4, 9,10,11,12,25,26,27,28,33,34,35,36]);  // LR -> FB
  var op_ud_fb = new Uint8Array([13,14,15,16,17,18,19,20,37,38,39,40,41,42,43,44]);  // UD -> FB
  for (var i=0; i < 16; i++) {
    var op1 = op_lr_fb[i];
    var op2 = op_ud_fb[i];
    for (var et=0; et < E_TWIST; et++) {
      et_sym[et*CUBE_SYM+op1] = et_sym[et*CUBE_SYM+op16e[op1*2+1]];
      et_sym[et*CUBE_SYM+op2] = et_sym[et*CUBE_SYM+op16e[op2*2+1]];
    }
  }
}

function populate_et_fr_uf() {
  // simple 1-1 mapping of et_fr to et_uf
  for (var et=0; et < E_TWIST; et++)
    et_fr_uf[et_sym_FR[et]] = et_sym_UF[et];
}

function init() {
  init2();
  set_colors_3c(0, 1, 2);
  init_map(map, sym_op_FR, sym_op_UR, reflect);
  populate_op_tables();
  populate_ep_sym();
  local_populate_et_sym();  // make et_sym but do not do et_sym_update()
  populate_et_sym_FR();     
  populate_et_sym_UF_m2();  // generate first row of et_sym_UF only
  local_update_et_sym();    // apply sym op translation only to et_sym 
  populate_et_fr_uf();      // generate et_fr to et_uf translation array 
}
</script>
