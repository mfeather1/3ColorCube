<body>
<center>
<font size=+2>6-Color Edge Position Symmetry</font>
<br><br>
<div id=status></div>
<a href="javascript: history.go(-1)">Back</a>
<br><br>
<script>
"use strict";
var ep_sym = new Uint16Array(E_PRM * CUBE_SYM);     // 3248 KB (3 MB)
var epm = new Int8Array(E_PRM);                     //   34 KB
var count1 = new Int32Array(24 * E_PRMr);           //  192 KB
var count2 = new Int32Array(49);

document.getElementById('status').innerHTML = 'Counts are running<br><br>';
setTimeout(main, 100);

function main() {
  var time0 = Date.now();
  init();
  counts();
  var time1 = ((Date.now()-time0)/1000).toFixed(2);
  document.getElementById('status').innerHTML += 
    '<br>Run Time: ' + time1 + '<br><br>';
}

function counts() {
  for (var ep=0; ep < E_PRM; ep++)
     epm[ep] = -1;
  var list = populate_list(E_PRM, ep_sym);  
  for (var i=1; i < list.length; i++) {
    var ep = list[i];
    epm[ep] = 0;
    var n = fill_epm(ep);
    clear_count1(n);
    do_epr_sym(ep);
    epr_counts(n);
  }
  rpt2(list[0]*E_PRMr, 2);
}

function fill_epm(ep) {
  var n = 1;
  for (var op=1; op < CUBE_SYM; op++) {
    var epsym = ep_sym[ep*CUBE_SYM + op];
    if (epm[epsym] == -1)
      epm[epsym] = n++;
  }
  return n;
}

function clear_count1(n) {
  for (var i=0; i < n; i++)
    for (var j=0; j < E_PRM; j++)
        count1[i*E_PRMr + j] = 0;
} 

function do_epr_sym(ep) {
  var epr = new Uint8Array(3);
  var eprsym = new Uint8Array(3);
  for (epr[0]=0; epr[0] < 24; epr[0]++) {
    for (epr[1]=0; epr[1] < 24; epr[1]++) {
      for (epr[2]=0; epr[2] < 24; epr[2]++) {
        var eprn = eprsum(epr);
        if (count1[eprn] == 0) {
          var min = eprn;
          count1[eprn] = min; 
          for (var op=1; op < CUBE_SYM; op++) {
            var epsym = ep_sym[ep*CUBE_SYM + op];
            get_eprsym2(eprsym, ep, epr, op);
            count1[epm[epsym]*E_PRMr + eprsum(eprsym)] = min;
          }
        }
      }
    }
  }
}

function epr_counts(n) {
  var epm = new Int8Array(E_PRMr);
  for (var i=0; i < n; i++)
    for (var j=0; j < E_PRMr; j++)
        epm[count1[i*E_PRMr + j]]++;
  for (var i=0; i < E_PRMr; i++)
    if (epm[i] != 0)
      count2[epm[i]]++;
}

function init() {
  if (ET_SYM_METHOD == 1)
    get_etsym = get_etsym_m1;
  else if (ET_SYM_METHOD == 2)
    get_etsym = get_etsym_m2;
  else
    get_etsym = get_etsym_m3;
  init2();
  set_colors_3c(0, 1, 2);
  init_map(map, sym_op_FR, sym_op_UR, reflect);
  populate_op_tables();
  populate_ep_sym();
  populate_epr_sym2();
  populate_ep_min();
  populate_min_ep();
  populate_ept_min_op();
}

function get_eprsym2(eprsym, ep, epr, op) {
  for (var i=0; i < 3; i++) {
    var ix = epr_idx[op*1485 + ep_slice[ep*3+i]*3 + i];
    eprsym[slice_map[op*3+i]] = epr_sym2[ix*24 + epr[i]];
  }
}

function eprsum(epr) {
  return(epr[0]*576 + epr[1]*24 + epr[2]);
}

function populate_ep_sym() {
  assign_centers_3c();
  var tmpstr = new Uint8Array(FACELETS);
  for (var ep=0; ep < E_PRM; ep++) {
    ep_sym[ep*CUBE_SYM] = ep;
    int_to_strp(ep_b3[ep], eps, 11, 3);
    make_cubestr_edg(edg2);
    for (var op=1; op < CUBE_SYM; op++) {
      sym_op(tmpstr, cubestr, op);
      ep_sym[ep*CUBE_SYM+op] = convert_edg_3c(tmpstr); 
    }
  }
}
</script>
