<a href="javascript: history.go(-1)">Back</a>

<script>
/*
  This version shows how get_etsym() is used without doing et_sym_update().
  The difference is that an extra lookup is done (op16e[op] instead of op)
  for the 32 sym ops that are not consistent.
*/

"use strict";

var count1 = new Uint32Array(E_PRM * E_TWIST);     // 271 MB
var count2 = new Uint8Array(E_PRM * E_TWIST);      //  68 MB
var ep_sym = new Uint16Array(E_PRM * CUBE_SYM);    //   3 MB
var et_sym_UF = new Uint16Array(E_PRM * E_TWIST);  //   2 MB

document.getElementById('status').innerHTML = 'Counts are running<br>';
setTimeout(main, 100);

function main() {
  var time0 = Date.now();
  init();
  count_ept_mins();
  var time1 = ((Date.now()-time0)/1000).toFixed(2);
  document.getElementById('status').innerHTML += 
    '<br>Run Time: ' + time1 + '<br>';
}

function count_ept_mins() {
  for (var ep=0; ep < E_PRM; ep++) {
    for(var et=0; et < E_TWIST; et++) {
      var min = ep*E_TWIST + et;
      if (count1[min] == 0) {
        count1[min] = min;
        for (var op=1; op < CUBE_SYM; op++) {
          var epsym = ep_sym[ep*CUBE_SYM+op];
          var etsym = get_etsym(ep, et, op);
          count1[epsym*E_TWIST+etsym] = min;
        }
      }
    }
  }
  count_mins(E_PRM, E_TWIST);
}

function get_etsym(ep, et, op) {
  if (op16e[op*2] == 0)
    return et_sym[et*CUBE_SYM+op];
  else if (op16e[op*2] == OP_FR)
    return et_sym[et_sym_FR[ep_slice[ep*3]*E_TWIST+et]*CUBE_SYM + op16e[op*2+1]];
  else 
    return et_sym[et_sym_UF[ep_slice[ep*3+1]*E_TWIST+et]*CUBE_SYM + op16e[op*2+1]];
}

function populate_ep_sym() {
  assign_centers_3c();
  var tmpstr = new Uint8Array(FACELETS);
  for (var ep=0; ep < E_PRM; ep++) {
    ep_sym[ep*CUBE_SYM] = ep;
    int_to_strp(ep_b3[ep], eps, 11, 3);
    make_cubestr_edg(edg2);
    for (var op=1; op < CUBE_SYM; op++) {
      sym_op(tmpstr, cubestr, op);
      ep_sym[ep*CUBE_SYM+op] = convert_edg_3c(tmpstr); 
    }
  }
}

function local_populate_et_sym() {
  init_op16e();
  assign_centers_3c();
  int_to_strp(ep_b3[0], eps, 11, 3);
  var tmpstr = new Uint8Array(FACELETS);
  for(var i=0; i < E_TWIST;  i++)
    for (var j=0; j < CUBE_SYM; j++)
      if (op16e[j*2] == 0) {
        int_to_strp(i, ets, 11, 2);
        make_cubestr_edg(edg2);
        sym_op(tmpstr, cubestr, map[j]);
        convert_edg_3c(tmpstr);
        et_sym[i*CUBE_SYM+j] = str_to_int(ets,11,2);
    }
}

function init() {
  init2();
  set_colors_3c(0, 1, 2);
  init_map(map, sym_op_FR, sym_op_UR, reflect);
  populate_op_tables();
  populate_ep_sym();
  local_populate_et_sym();  // make et_sym but do not do et_sym_update()
  populate_et_sym_FR();
  populate_et_sym_UF_m1(); 
}

</script>
