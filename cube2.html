<!doctype html>
<html>
  <head>
   <title>AnimCube</title>
   <meta name="robots" content="noindex, nofollow">
   <script src="AnimCube/2x2/animcube2.nocache.js"></script>
   <script src="mouse.js"></script>
   <link rel=icon href=cube.png>
   <style> 
     :focus { outline:none; }
     html, body { padding:0px; margin:0px; overflow:hidden; height:100% }
     canvas { display:block; }
   </style>
 </head>
<body ontouchstart="touchfunc('hidden')" ontouchend="touchfunc('auto')">
<script> 
divs = parent.document.getElementsByTagName("div");
function touchfunc(s) { divs[0].style.overflow = s; }
</script> 
<noscript style=color:red> JavaScript required for cube display </noscript>
</body>
</html>
